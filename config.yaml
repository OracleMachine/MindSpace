# MindSpace configuration. Secrets stay in env vars (see Agent/config.py).

log:
  stream_level: DEBUG   # console handler — DEBUG | INFO | WARNING | ERROR
  file_level: DEBUG     # file handler — usually more verbose than stream
  discord_level: INFO   # Discord #system-log channel
  file_path: ~/.logs/MindSpace/mindspace.log  # ~ expanded; relative paths resolve under storage.base_path; rotates daily, keeps 3 days

storage:
  base_path: /home/yolo/repos/Thought
  openviking_uri_prefix: "viking://"
  ignored_extensions: ["pdf"] # Extensions to skip during OpenViking indexing

brains:
  # Dialogue brain: passive chat, URL/file analysis, commit messages.
  # Options: "GoogleGenAISdk" | "litellm"
  dialogue_type: GoogleGenAISdk
  
  # Enable native Google Search Grounding for the dialogue brain
  enable_google_search: true

  # Command brain: !organize, !consolidate, !research, !omni.
  command_type: gemini-cli

  gemini_sdk_model: gemini-3-flash-preview
  # auto-gemini-3 → CLI picker; explicit names also work; null → CLI default.
  gemini_cli_model: auto-gemini-3

conversation:
  history_max_chars: 8000

mcp:
  servers:
    wisburg-mcp-server:
      url: https://mcp.wisburg.com/mcp
      headers:
        Authorization: Bearer ${WISBURG_MCP_TOKEN}
